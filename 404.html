<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>The Rescue Boat & Other Counter-Narratives</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string
      // into just a query string, and then redirects the browser to the new url
      // with only a query string and hash fragment, e.g.
      // http://www.foo.tld/one/two?a=b&c=d#qwe, becomes
      // http://www.foo.tld/?p=/one/two&q=a=b~and~c=d#qwe
      // Note: this script should run as early as possible in the head
      var pathConfigToReplace = ['/rescue-boat/'];
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        pathConfigToReplace[0] + '?p=' + l.pathname.split('/').filter(Boolean).slice(1).join('/') +
        '&q=' + l.search.slice(1).replace(/&/g, '~and~') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
